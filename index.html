<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oscar Jovel</title>
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/c8e4d183c2.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <header class="masthead">
      <div class="l-container l-col u-min-vh">
        <div class="header l-row-align-center">
          <span class="brand l-row">
            <img class="brand__logo" src="./assets/logo.PNG" alt="logo" />
            <span class="brand__name">Oscar J.</span>
          </span>

          <nav class="nav">
            <ul class="nav__list l-row">
              <li class="nav__item">
                <a href="#about" class="nav__link">About</a>
              </li>
              <li class="nav__item">
                <a href="#projects" class="nav__link">Projects</a>
              </li>
              <li class="nav__item">
                <a href="#contact" class="nav__link">Contact</a>
              </li>
              <li class="nav__item">
                <a href="" class="nav__link">
                  <i class="fas fa-adjust"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div>

        <div class="hero l-col">
          <h1 class="hero__title">
            Hey<br /><span class="u-accent">I'm Oscar</span>
          </h1>
          <p class="hero__description">
            I am a
            <b class="u-accent">Frontend Software Engineer</b>
            with a strong passion for building web applications with great user
            experiences.<br />Here's a bit more
            <b class="u-accent">about me.</b>
          </p>

          <ul class="socials l-row">
            <li class="socials__item">
              <a class="socials__link button" href="">
                <i class="fab fa-linkedin-in"></i>
              </a>
            </li>
            <li class="socials__item">
              <a class="socials__link button" href="">
                <i class="fab fa-github"></i>
              </a>
            </li>
            <li class="socials__item">
              <a class="socials__link button" href="">
                <i class="fas fa-file-pdf"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main>
      <section id="projects" class="projects section">
        <!--  -->
      </section>
    </main>

    <footer></footer>
  </body>
</html>
